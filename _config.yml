# Site
title: Horace Chan
subtitle: "Personal Website"
description: "Personal website of Horace Chan, a mechanical engineering undergraduate student exploring AI-assisted workflows, VLA, embodied AI, robotics, and robot control."
keywords: "Horace Chan, mechanical engineering, AI-assisted workflows, VLA, Embodied AI, robotics, robot control, personal website"
author: Horace Chan
language: en
timezone: Asia/Shanghai
url: https://horacech.github.io
root: /
permalink: posts/:year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
marked:
  prependRoot: true
  postAsset: false

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# Pagination
per_page: 8
pagination_dir: page

# Theme
theme: horace-minimal

# Profile content used by themes/horace-minimal
profile:
  greeting: "Hello, I'm Horace Chan."
  headline: "Mechanical Engineering undergraduate exploring Embodied AI, VLA models, and intelligent robots."
  intro: >-
    I connect AI-assisted workflows, Vision-Language-Action models, embodied AI, robotics, and robot control with hands-on engineering practice.
  cta_links:
    - label: "About"
      url: "/about/"
    - label: "Projects"
      url: "/projects/"
    - label: "GitHub"
      url: "https://github.com/HoraceCh"
    - label: "Contact"
      url: "/contact/"
  featured_project:
    title: "AI_RETRIEVAL_X / Information-Retrieval-Tool"
    url: "https://github.com/HoraceCh/Information-Retrieval-Tool"
    description: "An LLM-powered search query generator that turns natural language into optimized Boolean queries for academic databases such as CNKI, Web of Science, PubMed, and Ei Compendex. Built with TypeScript, Vite, and multi-model API support."
    tags:
      - "TypeScript"
      - "Vite"
      - "LLM-assisted workflow"

content_license:
  text: "Syncing Knowledge Garden Content licensed under"
  label: "CC BY-NC-SA 4.0"
  url: "https://creativecommons.org/licenses/by-nc-sa/4.0/"

menu:
  Home: /
  About: /about/
  Projects: /projects/
  Notes: /archives/
  Links: /links/
  Resume: /resume/
  Contact: /contact/

# Deployment example. GitHub Actions in .github/workflows/deploy.yml handles GitHub Pages.
deploy:
  type: ''
